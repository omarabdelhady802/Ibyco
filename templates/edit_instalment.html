{% extends 'base.html' %}

{% block content %}

<h1 class="mt-4">تعديل خطة تقسيط</h1>

<form method="POST">

<div class="form-group">
<label>اقل نسبه مقدم</label>
<input name="min_down_payment"
value="{{ instalment.min_down_payment }}"
class="form-control">
</div>

<div class="form-group">
<label>اعلي نسبه مقدم</label>
<input name="max_down_payment"
value="{{ instalment.max_down_payment }}"
class="form-control">
</div>

<div class="form-group">
<label>اقل شهور</label>
<input name="min_months"
value="{{ instalment.min_months }}"
class="form-control">
</div>

<div class="form-group">
<label>اعلي شهور</label>
<input name="max_months"
value="{{ instalment.max_months }}"
class="form-control">
</div>

<div class="form-group">
<label>النسبة الكلية</label>
<input name="percentage"
value="{{ instalment.percentage }}"
class="form-control">
</div>

<button class="btn btn-primary">
حفظ
</button>

</form>

{% endblock %}
