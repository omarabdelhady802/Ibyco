{% extends 'base.html' %}

{% block content %}

<h1 class="mt-4">تعديل قالب متابعة</h1>

<form method="POST">

<div class="form-group">
<label>اسم القالب</label>
<input name="template_name"
value="{{ template.template_name }}"
class="form-control">
</div>

<div class="form-group">
<label>نص الرسالة</label>
<textarea name="template_body"
class="form-control"
rows="6">{{ template.template_body }}</textarea>
</div>

<button class="btn btn-primary">
حفظ
</button>

</form>

{% endblock %}
